<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROV — Privatekonomi | Samhällskunskap 1a</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F6F9;
  --surface: #FFFFFF;
  --border: #D1D9E0;
  --border-strong: #B0BCC8;
  --text: #1A2332;
  --muted: #4A5568;
  --l1: #D4500A;
  --l2: #1A6FB5;
  --success: #1A7A4A;
  --success-bg: #E8F5EE;
  --success-border: #A3D4B5;
  --warning: #92600A;
  --warning-bg: #FEF3E2;
  --warning-border: #F5C97A;
  --danger: #C0392B;
  --danger-bg: #FDECEA;
  --danger-border: #F5A89A;
  --info-bg: #EBF4FD;
  --info-border: #A3C4E8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 16px;
  min-height: 100vh;
  line-height: 1.55;
}
h1,h2,h3 { font-family: 'Syne', sans-serif; }

/* HEADER */
#header {
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.logo span { color: var(--l1); }
.logo-sub { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 1px; }
.score-pill {
  background: var(--bg); border: 1px solid var(--border-strong);
  border-radius: 20px; padding: 6px 16px; font-size: 13px;
  font-family: 'Syne', sans-serif; font-weight: 700; color: var(--text);
}
.score-pill span { color: var(--success); }

/* APP */
#app { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }

/* PROGRESS BAR */
.progress-track {
  background: var(--border); border-radius: 6px; height: 8px; margin-bottom: 8px;
}
.progress-fill {
  height: 8px; border-radius: 6px; background: var(--l1);
  transition: width 0.4s ease;
}
.progress-label { font-size: 13px; color: var(--muted); font-weight: 500; display: flex; justify-content: space-between; margin-bottom: 16px; }

/* CARD */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px; margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.card.accent-ok { border-left: 5px solid var(--success); }
.card.accent-err { border-left: 5px solid var(--danger); }

/* QUESTION */
.q-meta { font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
.q-text { font-size: 18px; font-weight: 600; line-height: 1.4; margin-bottom: 20px; color: var(--text); }
.q-text .q-num { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--l1); margin-right: 6px; }

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 10px; padding: 14px 18px; cursor: pointer;
  font-size: 15px; transition: all 0.15s; text-align: left;
  color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 12px;
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800;
  background: var(--bg); border: 1px solid var(--border-strong); color: var(--muted);
  transition: all 0.15s;
}
.opt:hover:not(.locked) { border-color: var(--l2); background: var(--info-bg); }
.opt:hover:not(.locked) .opt-letter { background: var(--l2); color: #fff; border-color: var(--l2); }
.opt.correct { border-color: var(--success); background: var(--success-bg); }
.opt.correct .opt-letter { background: var(--success); color: #fff; border-color: var(--success); }
.opt.wrong { border-color: var(--danger); background: var(--danger-bg); }
.opt.wrong .opt-letter { background: var(--danger); color: #fff; border-color: var(--danger); }
.opt.show-correct { border-color: var(--success); background: var(--success-bg); opacity: 0.75; }
.opt.show-correct .opt-letter { background: var(--success); color: #fff; border-color: var(--success); }
.opt.locked { pointer-events: none; }
.opt.locked:not(.correct):not(.wrong):not(.show-correct) { opacity: 0.5; }

/* FEEDBACK BUBBLE */
.feedback-bubble {
  border-radius: 12px; padding: 16px 18px; margin-top: 16px;
  font-size: 15px; font-weight: 500; line-height: 1.55;
  display: flex; align-items: flex-start; gap: 12px;
}
.feedback-bubble.ok { background: var(--success-bg); border: 1px solid var(--success-border); color: #0E5C30; }
.feedback-bubble.err { background: var(--danger-bg); border: 1px solid var(--danger-border); color: #9B2010; }
.fb-icon { font-size: 22px; flex-shrink: 0; }
.fb-text strong { font-weight: 700; display: block; margin-bottom: 3px; font-size: 16px; }

/* BUTTONS */
.btn {
  background: var(--l1); color: #fff; border: none; border-radius: 10px;
  padding: 14px 28px; font-family: 'Syne', sans-serif; font-size: 15px;
  font-weight: 800; cursor: pointer; transition: all 0.15s;
}
.btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.btn-success { background: var(--success); }
.btn-secondary { background: var(--surface); border: 2px solid var(--border-strong); color: var(--text); }
.btn-secondary:hover { border-color: var(--l1); color: var(--l1); background: #FEF0E8; }
.btn-full { width: 100%; }
.btn-row { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* RESULT TABLE */
.result-row {
  display: flex; gap: 12px; padding: 14px 0;
  border-bottom: 1px solid var(--border); align-items: flex-start;
}
.result-row:last-child { border-bottom: none; }
.result-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.result-q { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 4px; }
.result-answer { font-size: 13px; color: var(--muted); }
.result-answer .correct-ans { color: var(--success); font-weight: 600; }
.result-answer .wrong-ans { color: var(--danger); font-weight: 600; text-decoration: line-through; margin-right: 6px; }

/* SCORE DISPLAY */
.score-hero { text-align: center; padding: 32px 16px 24px; }
.score-circle {
  width: 120px; height: 120px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  border: 6px solid var(--success);
  background: var(--success-bg);
}
.score-circle.fail { border-color: var(--danger); background: var(--danger-bg); }
.score-pct { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--success); line-height: 1; }
.score-circle.fail .score-pct { color: var(--danger); }
.score-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 3px; }
.score-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); }
.score-sub { color: var(--muted); font-size: 15px; margin-top: 8px; }

/* BADGE */
.badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 700; font-family: 'Syne', sans-serif;
  letter-spacing: 0.3px;
}
.badge-ok { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
.badge-err { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }

/* INTRO */
.intro-hero { text-align: center; padding: 36px 16px 28px; }
.intro-hero h1 { font-size: clamp(28px, 6vw, 44px); font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; }
.intro-hero h1 span { color: var(--l1); }
.intro-sub { color: var(--muted); font-size: 16px; margin: 12px auto 24px; max-width: 500px; line-height: 1.6; }

/* INFO GRID */
.info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 20px 0; }
.info-cell { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; }
.info-cell .label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.info-cell .value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); }

/* LINK TEASER */
.link-teaser {
  background: linear-gradient(135deg, #FEF0E8 0%, #FDE8D8 100%);
  border: 2px solid #E8A070; border-radius: 14px; padding: 20px 24px;
  display: flex; align-items: center; gap: 16px; margin-top: 24px;
  cursor: pointer; transition: all 0.2s; text-decoration: none;
}
.link-teaser:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212,80,10,0.15); }
.lt-emoji { font-size: 36px; flex-shrink: 0; }
.lt-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: var(--l1); }
.lt-sub { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

/* ANIMATE */
.fade-in { animation: fadeIn 0.35s ease both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* RESPONSIVE */
@media (max-width: 520px) {
  .info-grid { grid-template-columns: 1fr 1fr; }
  .q-text { font-size: 16px; }
  .card { padding: 20px; }
}

@media print {
  #header, .btn, .btn-row { display: none !important; }
}
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="logo">VUXEN<span>LIVET</span></div>
    <div class="logo-sub">Prov — Privatekonomi · Samhällskunskap 1a · Gy25</div>
  </div>

    Rätt: <span id="headerCorrect">0</span> / <span id="headerTotal">0</span>
  </div>
</div>

<div id="app"></div>

<script>
// ============================================================
// UNLOCK CHECK — must arrive via vuxenlivet done screen
// ============================================================
function checkUnlocked() {
  // Allow if referrer is index.html / vuxenlivet_spel.html,
  // OR if unlocked flag set in sessionStorage
  const ref = document.referrer;
  const fromGame = ref.includes('index') || ref.includes('vuxenlivet');
  const flagged = sessionStorage.getItem('vuxenlivet_done') === '1';
  return fromGame || flagged;
}

// Set flag when arriving from the game's done screen
if (document.referrer.includes('index') || document.referrer.includes('vuxenlivet')) {
  sessionStorage.setItem('vuxenlivet_done', '1');
}
const ALL_QUESTIONS = [
  // --- INKOMST & SKATT ---
  {
    id: 1, topic: 'Inkomst & skatt',
    q: 'Vad är skillnaden mellan bruttolön och nettolön?',
    opts: ['A) Bruttolönen betalas ut av arbetsgivaren och nettolönen av staten',

           'D) Det är samma sak, bara olika ord'],
    correct: 'B',
    explain: 'Bruttolön = vad arbetsgivaren betalar dig. Nettolön = vad som hamnar på ditt konto efter att arbetsgivaren dragit preliminärskatt (A-skatt) och betalat den till Skatteverket.',

  {
    id: 2, topic: 'Inkomst & skatt',
    q: 'Vad kallas den skatt som arbetsgivaren automatiskt drar från din lön varje månad?',

    praise: 'Exakt rätt! Du kan din skatteterminologi.',

  {
    id: 3, topic: 'Inkomst & skatt',
    q: 'Vad innebär det att man måste betala "kvarskatt"?',
    opts: ['A) En extra skatt för lägenhetsinnehavare',
           'B) Skatt som betalas varje kvartal',

           'D) Arbetsgivarens del av skatten'],
    correct: 'C',
    explain: 'Om arbetsgivaren dragit för lite preliminärskatt under året visar deklarationen ett underskott — det kallas kvarskatt. Omvänt: har för mycket dragits får man tillbaka pengar, kallat skatteåterbäring.',

  {

    praise: '✅ Rätt! Bra koll på skattesatserna.',
    encourage: 'Tänk: ungefär en tredjedel av lönen går i skatt — det är en bra tumregel att ha i huvudet.'

  // --- BUDGET ---

    id: 5, topic: 'Budget & hushållsekonomi',
    q: 'Vilket av följande är ett exempel på en FAST utgift i ett hushållsbudget?',
    opts: ['A) Restaurangbesök', 'B) Hyra', 'C) Klädinköp', 'D) Biobesök'],
    correct: 'B',
    explain: 'Fasta utgifter är kostnader som är lika stora varje månad och svåra att undvika på kort sikt, exempelvis hyra, bolån, telefonabonnemang och hemförsäkring. Rörliga utgifter varierar, som mat, nöje och kläder.',

// Shuffle array (Fisher-Yates)
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

  if (GS.screen === 'intro') renderIntro(app);
  else if (GS.screen === 'quiz') renderQuiz(app);
  else if (GS.screen === 'result') renderResult(app);

  updateHeader();
}

}

function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function renderQuiz(app) {
  const q = GS.questions[GS.current];
  const answered = GS.answered;
  const chosen = answered ? GS.answers[GS.answers.length-1] : null;
  const pct = Math.round(GS.current / TOTAL_Q * 100);

  const div = document.createElement('div');
  div.innerHTML = `
    <div class="progress-label">
      <span>Fråga ${GS.current + 1} av ${TOTAL_Q}</span>
      <span style="color:${GS.answers.length>0 ? 'var(--success)':  'var(--muted)'}">
        ${GS.answers.filter(a=>a.isCorrect).length} rätt hittills
      </span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>

    <div class="card ${answered ? (chosen.isCorrect ? 'accent-ok' : 'accent-err') : ''}">
      <div class="q-meta">📚 ${q.topic}</div>
      <div class="q-text"><span class="q-num">${GS.current+1}.</span>${q.q}</div>

      <div class="options">
        ${q.opts.map((opt, i) => {
          const letter = LETTERS[i];
          const isChosen = answered && chosen.chosen === letter;
          const isCorrect = letter === q.correct;
          let cls = '';
          if (answered) {
            if (isChosen && isCorrect) cls = 'correct locked';
            else if (isChosen && !isCorrect) cls = 'wrong locked';
            else if (isCorrect) cls = 'show-correct locked';
            else cls = 'locked';
          }
          return `<button class="opt ${cls}" onclick="${answered ? '' : `pickAnswer('${letter}')`}">
            <div class="opt-letter">${answered && isCorrect ? '✓' : answered && isChosen && !isCorrect ? '✗' : letter}</div>
            <div>${opt.replace(/^[A-D]\) /, '')}</div>
          </button>`;
        }).join('')}
      </div>

      ${answered ? `
        <div class="feedback-bubble ${chosen.isCorrect ? 'ok' : 'err'}">
          <div class="fb-icon">${chosen.isCorrect ? '🎉' : '📖'}</div>
          <div class="fb-text">
            <strong>${chosen.isCorrect ? rand(PRAISE) : rand(ENCOURAGE)}</strong>
            ${q.explain}
          </div>
        </div>
        <div class="btn-row">
          ${GS.current + 1 < TOTAL_Q
            ? `<button class="btn btn-full" onclick="nextQ()">NÄSTA FRÅGA →</button>`
            : `<button class="btn btn-full btn-success" onclick="showResult()">SE RESULTAT 🏆</button>`
          }
        </div>
      ` : ''}
    </div>

    ${answered && GS.current + 1 < TOTAL_Q ? '' : ''}
  `;
  app.appendChild(div);
}

function pickAnswer(letter) {
  const q = GS.questions[GS.current];
  const isCorrect = letter === q.correct;
  GS.answers.push({ qid: q.id, chosen: letter, correct: q.correct, isCorrect });
  GS.answered = true;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextQ() {
  GS.current++;
  GS.answered = false;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResult() {
  GS.screen = 'result';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

            <span style="color:var(--muted);font-weight:500;font-size:12px">${q.topic} · Fråga ${i+1}</span><br>
            ${q.q}
          </div>
          <div class="result-answer">
            ${ans.isCorrect
              ? `<span class="correct-ans">✓ ${correctText}</span>`
              : `<span class="wrong-ans">${chosenText}</span> → <span class="correct-ans">✓ ${correctText}</span>`
            }
          </div>
          <div style="font-size:13px;color:var(--muted);margin-top:5px;line-height:1.5;background:var(--bg);padding:8px 10px;border-radius:8px">
            💡 ${q.explain}
          </div>
        </div>
        <div style="flex-shrink:0;margin-left:8px">
          <span class="badge ${ans.isCorrect ? 'badge-ok' : 'badge-err'}">${ans.isCorrect ? 'RÄTT' : 'FEL'}</span>
        </div>
      </div>
    `;
  }).join('');

  div.innerHTML += `
    <div class="card">
      <h3 style="margin-bottom:4px">📋 Alla frågor — rätt och fel</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Rätt svar visas för varje fråga, även de du svarade fel på.</p>
      ${reviewHTML}
    </div>

    <a href="vuxenlivet_spel.html" class="link-teaser" style="text-decoration:none;display:flex">
      <div class="lt-emoji">🎮</div>
      <div>
        <div class="lt-title">Kom ihåg — klara Vuxenlivet-appen först!</div>
        <div class="lt-sub">Du måste ha klarat alla 5 nivåer i Vuxenlivet-appen med godkänt resultat för att det ska räknas att du gjort det här provet. Det är din biljett vidare!</div>
      </div>
      <div style="margin-left:auto;font-size:22px;align-self:center">→</div>
    </a>

    <div class="btn-row" style="margin-top:16px">
      <button class="btn" onclick="initQuiz();render()">🔄 Nytt försök</button>
      <button class="btn btn-secondary" onclick="GS.screen='intro';render()">← Startsidan</button>
      <button style="background:none;border:1px solid var(--border-strong);border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif" onclick="window.print()">🖨️ Skriv ut</button>
    </div>
  `;

  app.appendChild(div);
}

// ============================================================
// INIT
// ============================================================
if (!checkUnlocked()) {
  document.getElementById('app').innerHTML = `
    <div style="max-width:520px;margin:60px auto 0;padding:0 20px;text-align:center">
      <div style="font-size:64px;margin-bottom:16px">🔒</div>
      <h2 style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text);margin-bottom:10px">
        Provet är låst
      </h2>
      <p style="color:var(--muted);font-size:16px;line-height:1.65;margin-bottom:28px">
        Du måste först klara <strong style="color:var(--text)">alla 5 nivåer</strong> i Vuxenlivet-appen med godkänt resultat för att låsa upp det här provet.
      </p>
      <a href="index.html" style="
        display:inline-block;
        background:var(--l1);color:#fff;
        font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
        padding:16px 36px;border-radius:12px;text-decoration:none;
        box-shadow:0 4px 14px rgba(212,80,10,0.25);
      ">🎮 GÅ TILL VUXENLIVET →</a>
      <p style="margin-top:20px;font-size:13px;color:var(--muted)">
        Klara spelet → certifikatsidan → knappen "Gå till provet" låses upp
      </p>
    </div>
  `;
} else {
  render();
}
</script>
</body>
