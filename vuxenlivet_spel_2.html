<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUXENLIVET — Ekonomispelet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F6F9;
  --surface: #FFFFFF;
  --border: #D1D9E0;
  --border-strong: #B0BCC8;
  --text: #1A2332;
  --muted: #4A5568;
  --l1: #D4500A;
  --l2: #1A6FB5;
  --l3: #7C3AAE;
  --l4: #C0392B;
  --l5: #1A7A4A;
  --success: #1A7A4A;
  --success-bg: #E8F5EE;
  --success-border: #A3D4B5;
  --warning: #92600A;
  --warning-bg: #FEF3E2;
  --warning-border: #F5C97A;
  --danger: #C0392B;
  --danger-bg: #FDECEA;
  --danger-border: #F5A89A;
  --info-bg: #E8F1FB;
  --info-border: #A3C4E8;
  --hint-bg: #F0F7E8;
  --hint-border: #7DB54A;
  --hint-text: #2D5016;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 16px;
  min-height: 100vh;
  line-height: 1.5;
}
h1, h2, h3, .level-title {
  font-family: 'Syne', sans-serif;
  color: var(--text);
}

/* HEADER */
#header {
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
.logo span { color: var(--l1); }

/* PROGRESS */
.progress-bar { display: flex; align-items: center; gap: 4px; }
.progress-dot {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800;
  border: 2px solid var(--border-strong); background: var(--bg); color: var(--muted);
  cursor: default; transition: all 0.3s;
}
.progress-dot.done { background: var(--success); border-color: var(--success); color: #fff; }
.progress-dot.active { border-color: var(--l1); color: var(--l1); background: #FEF0E8; }
.progress-line { width: 20px; height: 2px; background: var(--border-strong); }
.progress-line.done { background: var(--success); }

/* MAIN CONTAINER */
#app { max-width: 800px; margin: 0 auto; padding: 32px 20px 60px; }

/* CARD */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px 28px; margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.card.accent-1 { border-left: 4px solid var(--l1); }
.card.accent-2 { border-left: 4px solid var(--l2); }
.card.accent-3 { border-left: 4px solid var(--l3); }
.card.accent-4 { border-left: 4px solid var(--l4); }
.card.accent-5 { border-left: 4px solid var(--l5); }

/* LEVEL HEADER */
.level-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.level-badge { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.lb-1 { background: #FDE8D8; }
.lb-2 { background: #D6EAF8; }
.lb-3 { background: #EDE0F5; }
.lb-4 { background: #FDDCDA; }
.lb-5 { background: #D5EFE0; }
.level-meta { color: var(--muted); font-size: 13px; margin-top: 2px; font-weight: 500; }
.level-title { font-size: 26px; font-weight: 800; line-height: 1.1; color: var(--text); }

/* FACT BOX */
.fact-box {
  background: #EBF4FD; border-left: 4px solid var(--l2);
  border-radius: 0 8px 8px 0; padding: 16px 18px; margin: 16px 0;
  font-size: 15px; line-height: 1.65; color: var(--text);
}
.fact-box strong { font-weight: 700; }

/* INFO GRID */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.info-cell { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.info-cell .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.info-cell .value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
.info-cell .value.green { color: var(--success); }
.info-cell .value.orange { color: var(--l1); }
.info-cell .value.blue { color: var(--l2); }

/* QUIZ */
.quiz-section { margin: 20px 0; }
.quiz-q { font-weight: 700; margin-bottom: 12px; font-size: 16px; color: var(--text); }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  background: var(--surface); border: 2px solid var(--border); border-radius: 10px;
  padding: 13px 16px; cursor: pointer; font-size: 15px; transition: all 0.15s;
  text-align: left; color: var(--text); font-family: 'DM Sans', sans-serif;
}
.quiz-opt:hover:not(.locked) { border-color: var(--l2); background: #EBF4FD; }
.quiz-opt.correct { border-color: var(--success); background: #E8F5EE; color: #0E5C30; font-weight: 600; }
.quiz-opt.wrong { border-color: var(--danger); background: #FDECEA; color: #9B2010; font-weight: 600; }
.quiz-opt.locked { pointer-events: none; }

/* CALCULATOR */
.calc-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.calc-row:last-child { border-bottom: none; }
.calc-label { font-size: 15px; color: var(--text); flex: 1; }
.calc-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); min-width: 100px; text-align: right; }
.calc-value.negative { color: var(--danger); }
.calc-value.positive { color: var(--success); }
.calc-total { background: var(--bg); border: 1px solid var(--border-strong); border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-weight: 700; color: var(--text); }

/* SLIDER INPUTS */
.slider-row { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
.slider-label { font-size: 14px; color: var(--text); width: 145px; flex-shrink: 0; font-weight: 500; }
input[type=range] { -webkit-appearance: none; flex: 1; height: 7px; border-radius: 4px; background: var(--border-strong); outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--l1); cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.25); }
.slider-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; min-width: 80px; text-align: right; color: var(--l1); }

/* MINI CALCULATOR */
/* FLOATING CALCULATOR */
.calc-open-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--surface);
  border: 2px solid var(--l2);
  border-radius: 9px;
  padding: 9px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: var(--l2);
  cursor: pointer;
  transition: all 0.15s;
  margin: 12px 0 6px;
}
.calc-open-btn:hover { background: var(--info-bg); transform: translateY(-1px); }
.calc-open-btn .calc-icon { font-size: 18px; }

.float-calc-overlay {
  position: fixed;
  inset: 0;
  background: transparent;
  z-index: 500;
  pointer-events: none;
}
.float-calc-box {
  background: var(--surface);
  border: 2px solid var(--l2);
  border-radius: 16px;
  padding: 20px;
  width: 280px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 501;
  pointer-events: all;
  cursor: default;
  user-select: none;
}
.float-calc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  cursor: grab;
  padding: 2px 0 8px;
  border-bottom: 1px solid var(--border);
}
.float-calc-header:active { cursor: grabbing; }
.float-calc-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 800;
  color: var(--l2);
}
.float-calc-close {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--muted);
  line-height: 1;
  padding: 2px 6px;
  border-radius: 6px;
}
.float-calc-close:hover { background: var(--bg); color: var(--text); }
.float-calc-display {
  background: var(--bg);
  border: 2px solid var(--border-strong);
  border-radius: 9px;
  padding: 12px 14px;
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  text-align: right;
  color: var(--text);
  margin-bottom: 12px;
  min-height: 52px;
  word-break: break-all;
  line-height: 1.2;
}
.float-calc-display .expr {
  font-size: 12px;
  color: var(--muted);
  font-weight: 400;
  display: block;
  margin-bottom: 2px;
  text-align: right;
  min-height: 16px;
}
.calc-btns {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 7px;
}
.cb {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 13px 4px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.1s;
  color: var(--text);
  text-align: center;
}
.cb:hover { background: var(--info-bg); border-color: var(--l2); }
.cb.op { background: var(--info-bg); color: var(--l2); border-color: var(--l2); }
.cb.eq { background: var(--l2); color: #fff; border-color: var(--l2); }
.cb.eq:hover { filter: brightness(1.1); }
.cb.clr { background: #FDECEA; color: var(--danger); border-color: var(--danger-border); }
.cb.pct-btn { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-border); }

/* NUMBER INPUT */
.num-input-wrap { display: flex; align-items: center; gap: 8px; }
.num-input { background: var(--surface); border: 2px solid var(--border-strong); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 18px; font-family: 'Syne', sans-serif; font-weight: 700; width: 150px; text-align: right; }
.num-input:focus { outline: none; border-color: var(--l2); background: #EBF4FD; }

/* BUTTONS */
.btn { background: var(--l1); color: #fff; border: none; border-radius: 10px; padding: 14px 28px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px; }
.btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-secondary { background: var(--surface); border: 2px solid var(--border-strong); color: var(--text); }
.btn-secondary:hover { border-color: var(--l1); color: var(--l1); background: #FEF0E8; }
.btn-success { background: var(--success); color: #fff; }
.btn-blue { background: var(--l2); color: #fff; }
.btn-full { width: 100%; }
.btn-row { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

/* UNDO BUTTON */
.btn-undo { background: none; border: 1px solid var(--border-strong); border-radius: 8px; color: var(--muted); padding: 7px 14px; font-size: 13px; cursor: pointer; transition: all 0.2s; margin-top: 8px; display: inline-block; font-family: 'DM Sans', sans-serif; }
.btn-undo:hover { border-color: #92600A; color: #92600A; background: #FEF3E2; }

/* PRINT BUTTON */
.print-btn { background: none; border: 1px solid var(--border-strong); border-radius: 8px; color: var(--muted); padding: 8px 16px; font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
.print-btn:hover { border-color: var(--l1); color: var(--l1); background: #FEF0E8; }

/* GODKÄNT BADGE */
.approved-banner { background: #E8F5EE; border: 2px solid #A3D4B5; border-radius: 14px; padding: 20px 24px; display: flex; align-items: center; gap: 16px; margin: 20px 0; }
.approved-check { font-size: 36px; }
.approved-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--success); }
.approved-sub { font-size: 14px; color: var(--muted); margin-top: 4px; font-weight: 500; }

/* CHARACTER SELECT */
.char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.char-card { background: var(--surface); border: 2px solid var(--border); border-radius: 14px; padding: 20px 16px; cursor: pointer; transition: all 0.15s; text-align: center; }
.char-card:hover { border-color: var(--l2); background: #EBF4FD; }
.char-card.selected { border-color: var(--l1); background: #FEF0E8; }
.char-card.locked-out { opacity: 0.3; pointer-events: none; cursor: default; }
.char-card.selected .undo-tag { display: inline-block; margin-top: 8px; font-size: 12px; color: var(--muted); border: 1px solid var(--border-strong); border-radius: 6px; padding: 3px 10px; cursor: pointer; transition: all 0.2s; background: var(--surface); }
.char-card.selected .undo-tag:hover { color: var(--l1); border-color: var(--l1); }
.char-emoji { font-size: 36px; margin-bottom: 10px; }
.char-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; margin-bottom: 4px; color: var(--text); }
.char-salary { font-size: 13px; color: var(--muted); line-height: 1.6; }
.char-salary strong { color: var(--success); }

/* HOUSING SELECT */
.housing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.housing-card { background: var(--surface); border: 2px solid var(--border); border-radius: 14px; padding: 20px; cursor: pointer; transition: all 0.15s; }
.housing-card:hover { border-color: var(--l2); background: #EBF4FD; }
.housing-card.selected { border-color: var(--l1); background: #FEF0E8; }
.housing-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; margin: 8px 0 6px; color: var(--text); }
.housing-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

/* RESULT BOX */
.result-box { background: var(--bg); border-radius: 12px; padding: 18px; margin: 12px 0; }
.result-box.danger { border: 2px solid #F5A89A; background: #FDECEA; }
.result-box.success { border: 2px solid #A3D4B5; background: #E8F5EE; }
.result-box.neutral { border: 1px solid var(--border); }

/* FEEDBACK */
.feedback { padding: 13px 16px; border-radius: 10px; margin: 10px 0; font-size: 15px; line-height: 1.55; font-weight: 500; }
.feedback.ok { background: #E8F5EE; color: #0E5C30; border: 1px solid #A3D4B5; }
.feedback.err { background: #FDECEA; color: #9B2010; border: 1px solid #F5A89A; }
.feedback.info { background: #FEF3E2; color: #7A4F08; border: 1px solid #F5C97A; }

/* HINT BOX */
.hint-box { background: #F0F7E8; border: 2px dashed #7DB54A; border-radius: 10px; padding: 13px 16px; margin: 10px 0 4px; font-size: 15px; color: #2D5016; line-height: 1.55; font-weight: 500; }
.hint-box strong { color: #1E3A0E; font-weight: 700; }

/* SCENARIO CARDS */
.scenario-opts { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
.scenario-opt { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.15s; }
.scenario-opt:hover:not(.locked) { border-color: var(--l2); background: #EBF4FD; }
.scenario-opt.selected { border-color: var(--l2); background: #EBF4FD; }
.scenario-opt.best { border-color: var(--success); background: #E8F5EE; }
.scenario-opt.bad { border-color: var(--danger); background: #FDECEA; }
.scenario-opt.locked { pointer-events: none; }
.so-title { font-weight: 700; margin-bottom: 4px; font-size: 15px; color: var(--text); }
.so-detail { font-size: 14px; color: var(--muted); }

/* LIFE WHEEL */
#wheelCanvas { display: block; margin: 20px auto; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); }
.wheel-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
.wheel-ctrl .wc-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; font-weight: 600; }
.wheel-ctrl .wc-label span { font-weight: 700; color: var(--text); }

/* BUDGET TABLE */
.budget-table { width: 100%; border-collapse: collapse; }
.budget-table tr td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid var(--border); color: var(--text); }
.budget-table tr:last-child td { border-bottom: none; }
.budget-table .section-header td { background: var(--bg); font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 8px 12px; font-weight: 700; }
.budget-table .amount { text-align: right; font-family: 'Syne', sans-serif; font-weight: 700; }
.budget-table .negative { color: var(--danger); }
.budget-table .positive { color: var(--success); }
.budget-table .total-row td { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; background: var(--bg); padding: 14px 12px; border-top: 2px solid var(--border-strong); color: var(--text); }

/* REPORÄNTA VISUAL */
.repo-visual { display: flex; align-items: flex-end; gap: 6px; height: 90px; margin: 16px 0 4px; padding: 0 4px; }
.repo-bar { flex: 1; background: var(--l2); border-radius: 4px 4px 0 0; position: relative; opacity: 0.45; transition: height 0.5s; }
.repo-bar.current { opacity: 1; background: var(--l1); }
.repo-year { font-size: 11px; color: var(--muted); text-align: center; margin-top: 4px; font-weight: 600; }
.repo-pct { font-size: 11px; color: var(--text); font-weight: 700; text-align: center; position: absolute; top: -20px; left: 0; right: 0; }

/* TOOLTIP */
.tooltip { background: var(--bg); border: 1px solid var(--border-strong); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* INTRO SCREEN */
.intro-hero { text-align: center; padding: 40px 20px; }
.intro-hero h1 { font-size: clamp(36px, 7vw, 58px); font-weight: 800; letter-spacing: -2px; line-height: 1; color: var(--text); }
.intro-hero h1 .highlight { color: var(--l1); }
.intro-sub { color: var(--muted); font-size: 17px; margin: 16px auto 32px; line-height: 1.6; max-width: 500px; }
.step-pills { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
.step-pill { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--muted); font-weight: 500; }
.step-pill .num { color: var(--l1); font-weight: 700; margin-right: 4px; }

/* STARS */
.stars { font-size: 24px; letter-spacing: 2px; margin: 8px 0; }

/* ANIMATE IN */
.fade-in { animation: fadeIn 0.35s ease both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* FINISH SCREEN */
.finish-hero { text-align: center; padding: 20px 0; }
.finish-hero h2 { font-size: 42px; font-weight: 800; color: var(--success); }
.finish-hero p { color: var(--muted); margin-top: 8px; font-size: 16px; }
.trophies { font-size: 40px; letter-spacing: 4px; margin: 12px 0; }

/* RESPONSIVE */
@media (max-width: 520px) {
  .char-grid, .housing-grid, .info-grid, .wheel-controls { grid-template-columns: 1fr; }
  .level-title { font-size: 22px; }
  .intro-hero h1 { font-size: 34px; }
  .card { padding: 18px; }
}

@media print {
  body { background: white; }
  #header, .btn, .btn-row { display: none !important; }
}
</style>
</head>
<body>

<div id="header">
  <div class="logo">VUXEN<span>LIVET</span></div>
  <div class="progress-bar" id="progressBar">
    <!-- rendered by JS -->
  </div>
</div>

<div id="app">
  <!-- rendered by JS -->
</div>

<script>
// ============================================================
// STATE
// ============================================================
const GS = {
  screen: 'intro',      // intro | level1 | level2 | level3 | level4 | level5 | done
  profession: null,
  housing: null,
  completed: [],        // levels completed
  l1: { q1: null, q2: null, netInput: '' },
  l2: { q1: null, annualInput: '' },
  l3: { sliders: { mat: 3200, transport: 1050, telefon: 299, forsakring: 180, streaming: 249, ovrigt: 500 } },
  l4: { choice: null },
  l5: { wheel: { jobb: 5, fritid: 5, motion: 5, familj: 5, vanner: 5, hobby: 5 } },
  attempts: { l1_q1:0, l1_q2:0, l1_net:0, l2_q1:0, l2_annual:0 },
  car: { own: false, price: 120000, loanType: 'billan', rate: 7, months: 60, tax: 130, insurance: 500, service: 250, besiktning: 100, km: 1500, fuel: 0.8, fuelPrice: 22 },

// ============================================================
// FLOATING CALCULATOR
// ============================================================
const CALC = { expr: '', result: '0', op: null, prev: null, newNum: true };

function openCalc() {
  if (document.getElementById('floatCalcOverlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'floatCalcOverlay';
  overlay.className = 'float-calc-overlay';
  overlay.innerHTML = `
    <div class="float-calc-box" id="floatCalcBox">
      <div class="float-calc-header" id="floatCalcHandle">
        <span class="float-calc-title">🧮 Miniräknare <span style="font-size:11px;font-weight:400;color:var(--muted)">— dra för att flytta</span></span>
        <button class="float-calc-close" onclick="closeCalc()">✕</button>
      </div>
      <div class="float-calc-display">
        <span class="expr" id="calcExpr"></span>
        <span id="calcDisplay">0</span>
      </div>
      <div class="calc-btns">
        <button class="cb clr" onclick="calcC()">C</button>
        <button class="cb op" onclick="calcSign()">+/−</button>
        <button class="cb pct-btn" onclick="calcPct()">%</button>
        <button class="cb op" onclick="calcOp('÷')">÷</button>

        <button class="cb" onclick="calcNum('7')">7</button>
        <button class="cb" onclick="calcNum('8')">8</button>
        <button class="cb" onclick="calcNum('9')">9</button>
        <button class="cb op" onclick="calcOp('×')">×</button>

        <button class="cb" onclick="calcNum('4')">4</button>
        <button class="cb" onclick="calcNum('5')">5</button>
        <button class="cb" onclick="calcNum('6')">6</button>
        <button class="cb op" onclick="calcOp('−')">−</button>

        <button class="cb" onclick="calcNum('1')">1</button>
        <button class="cb" onclick="calcNum('2')">2</button>
        <button class="cb" onclick="calcNum('3')">3</button>
        <button class="cb op" style="grid-row:span 2" onclick="calcOp('+')">+</button>

        <button class="cb" style="grid-column:span 2" onclick="calcNum('0')">0</button>
        <button class="cb" onclick="calcNum('.')">.</button>

        <button class="cb eq" style="grid-column:span 4;padding:14px" onclick="calcEquals()">=</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  CALC.expr=''; CALC.result='0'; CALC.op=null; CALC.prev=null; CALC.newNum=true;
  updateCalcDisplay();

  // ── DRAG LOGIC ──────────────────────────────────────────
  const box = document.getElementById('floatCalcBox');
  const handle = document.getElementById('floatCalcHandle');

  // Position at center on open
  const rect = box.getBoundingClientRect();
  box.style.transform = 'none';
  box.style.left = Math.round((window.innerWidth - rect.width) / 2) + 'px';
  box.style.top  = Math.round((window.innerHeight - box.offsetHeight) / 2) + 'px';

  let startX, startY, startLeft, startTop, dragging = false;

  handle.addEventListener('mousedown', dragStart);
  handle.addEventListener('touchstart', dragStart, { passive: false });

  function dragStart(e) {
    e.preventDefault();
    dragging = true;
    const pos = e.touches ? e.touches[0] : e;
    startX = pos.clientX;
    startY = pos.clientY;
    startLeft = parseInt(box.style.left) || box.offsetLeft;
    startTop  = parseInt(box.style.top)  || box.offsetTop;
    handle.style.cursor = 'grabbing';
    document.addEventListener('mousemove', dragMove);
    document.addEventListener('touchmove', dragMove, { passive: false });
    document.addEventListener('mouseup',   dragEnd);
    document.addEventListener('touchend',  dragEnd);
  }

  function dragMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const pos = e.touches ? e.touches[0] : e;
    const dx = pos.clientX - startX;
    const dy = pos.clientY - startY;
    // Keep within viewport
    const maxLeft = window.innerWidth  - box.offsetWidth  - 8;
    const maxTop  = window.innerHeight - box.offsetHeight - 8;
    box.style.left = Math.max(8, Math.min(maxLeft, startLeft + dx)) + 'px';
    box.style.top  = Math.max(8, Math.min(maxTop,  startTop  + dy)) + 'px';
  }

  function dragEnd() {
    dragging = false;
    handle.style.cursor = 'grab';
    document.removeEventListener('mousemove', dragMove);
    document.removeEventListener('touchmove', dragMove);
    document.removeEventListener('mouseup',   dragEnd);
    document.removeEventListener('touchend',  dragEnd);
  }
}

function closeCalc() {
  const el = document.getElementById('floatCalcOverlay');
  if (el) el.remove();
}

function updateCalcDisplay() {
  const disp = document.getElementById('calcDisplay');
  const expr = document.getElementById('calcExpr');
  if (disp) {
    const n = parseFloat(CALC.result);
    disp.textContent = isNaN(n) ? 'Fel' : n.toLocaleString('sv-SE', {maximumFractionDigits:8});
  }
  if (expr) expr.textContent = CALC.expr;
}

function calcNum(d) {
  if (CALC.newNum) { CALC.result = d === '.' ? '0.' : d; CALC.newNum = false; }
  else if (d === '.' && CALC.result.includes('.')) return;
  else if (CALC.result === '0' && d !== '.') CALC.result = d;
  else CALC.result += d;
  updateCalcDisplay();
}

function calcOp(op) {
  CALC.prev = parseFloat(CALC.result);
  CALC.expr = CALC.result + ' ' + op;
  CALC.op = op;
  CALC.newNum = true;
  updateCalcDisplay();
}

function calcEquals() {
  if (!CALC.op || CALC.prev === null) return;
  const cur = parseFloat(CALC.result);
  let res;
  if (CALC.op === '+') res = CALC.prev + cur;
  else if (CALC.op === '−') res = CALC.prev - cur;
  else if (CALC.op === '×') res = CALC.prev * cur;
  else if (CALC.op === '÷') res = cur !== 0 ? CALC.prev / cur : NaN;
  CALC.expr = CALC.expr + ' ' + CALC.result + ' =';
  CALC.result = isNaN(res) ? 'Fel' : String(Math.round(res * 1e8) / 1e8);
  CALC.op = null; CALC.prev = null; CALC.newNum = true;
  updateCalcDisplay();
}

function calcC() {
  CALC.expr=''; CALC.result='0'; CALC.op=null; CALC.prev=null; CALC.newNum=true;
  updateCalcDisplay();
}

function calcSign() {
  CALC.result = String(-parseFloat(CALC.result));
  updateCalcDisplay();
}

function calcPct() {
  CALC.result = String(parseFloat(CALC.result) / 100);
  updateCalcDisplay();
}

  const bar = document.getElementById('progressBar');
  const levels = [1,2,3,4,5];

// CAR COST HELPER
// ============================================================
function carMonthlyCost() {
  const c = GS.car;
  if (!c.own) return 0;
  const rate = c.rate / 100 / 12;
  const loan = rate > 0
    ? Math.round(c.price * rate / (1 - Math.pow(1 + rate, -c.months)))
    : Math.round(c.price / c.months);
  const fuelMonthly = Math.round(c.km * c.fuel * c.fuelPrice / 12);
  return loan + c.tax + c.insurance + c.service + Math.round(c.besiktning / 12) + fuelMonthly;
}

function carLoanMonthly() {
  const c = GS.car;
  const rate = c.rate / 100 / 12;
  return rate > 0
    ? Math.round(c.price * rate / (1 - Math.pow(1 + rate, -c.months)))
    : Math.round(c.price / c.months);
}

function renderLevel4() {
  const done = GS.completed.includes(4);

  const AMOUNT = 6000;
  const opts = [
    {
      id: 'kredit', title: '💳 Kreditkort', rating: 'bad',
      desc: '24% årsränta. Du betalar 400 kr/mån.',
      detail: () => {
        let balance = AMOUNT, total = 0, months = 0;
        while (balance > 0 && months < 120) {
          const interest = balance * 0.24/12;
          const payment = Math.min(400, balance + interest);
          balance = balance + interest - payment;
          total += payment; months++;
        }
        return { total: Math.round(total), months, extra: Math.round(total - AMOUNT) };
      }
    },
    {
      id: 'avbet', title: '🏪 Avbetalning (butiken)', rating: 'neutral',
      desc: '18% årsränta. 12 månaders avbetalning.',
      detail: () => {
        const rate = 0.18/12;
        const payment = Math.round(AMOUNT * rate / (1 - Math.pow(1+rate,-12)));
        return { total: payment * 12, months: 12, extra: Math.round(payment*12 - AMOUNT) };
      }
    },
    {
      id: 'spara', title: '💰 Spara ihop', rating: 'best',
      desc: 'Du sparar 1500 kr extra/mån i 4 månader.',
      detail: () => ({ total: AMOUNT, months: 4, extra: 0 })
    },
  ];

  return `
  <div class="level-header">
    <div class="level-badge lb-4">💳</div>
    <div>
      <div class="level-meta">NIVÅ 4 — KREDITER & LÅN</div>

      <strong>Ränta på ränta:</strong> Om du inte betalar av skulden minskar den inte av sig själv — tvärtom växer den för att räntan läggs på kapitalet varje månad.

    <div class="scenario-opts">
      ${opts.map(o => {
        const d = o.detail();
        const sel = GS.l4.choice === o.id;
        return `
        <div class="scenario-opt ${sel ? (o.rating === 'best' ? 'best' : o.rating === 'bad' ? 'bad' : 'selected') : ''}" onclick="GS.l4.choice='${o.id}';render()">

          <div class="so-detail">${o.desc}</div>

          </div>
          ${o.rating === 'best' ? '<div class="feedback ok" style="margin-top:10px">✓ Bäst val! Sparande kostar 0 kr extra. Lägg 1500 kr/mån i 4 månader och köp sedan kontant.</div>' : o.rating === 'bad' ? '<div class="feedback err" style="margin-top:10px">⚠️ Kreditkort med 24% ränta kostar dig +' + fmt(d.extra) + ' kr extra. Det är pengar som försvinner i ränta!</div>' : '<div class="feedback info" style="margin-top:10px">ⓘ Avbetalning är OK om du måste — men notera att du betalar +' + fmt(d.extra) + ' kr extra i ränta.</div>'}
          ` : ''}
        </div>`;
      }).join('')}
    </div>
    ${GS.l4.choice ? `<button class="btn-undo" onclick="GS.l4.choice=null;render()">↩ Ångra val</button>` : ''}

      <strong>Räkna själv!</strong> Prova: 80 000 kr lån, 7% ränta, 60 månader. Vad blir månadsbetalningen?
      Formel: <em>r × P / (1 − (1+r)^−n)</em> där r = månadsränta, P = lånebelopp, n = månader.
      Eller räkna steg för steg med miniräknaren.

function getNetHint(gross, attempt) {
  const hints = [
    `Tumregeln är: Bruttolön × 0,69. Ditt tal är ${gross.toLocaleString('sv-SE')} kr — vad ger ${gross.toLocaleString('sv-SE')} × 0,69?`,
    `Räkna: ${gross.toLocaleString('sv-SE')} × 0,69 = ${Math.round(gross * 0.69).toLocaleString('sv-SE')} kr. Ange ett tal nära detta (±700 kr godkänns).`,
    `Svaret är ungefär ${Math.round(gross * 0.69).toLocaleString('sv-SE')} kr. Ange detta tal!`,
  ];
  return hints[Math.min(attempt, hints.length - 1)];
}

function getAnnualHint(monthly, attempt) {
  const hints = [
    `Månadsboendekostnaden är ${monthly.toLocaleString('sv-SE')} kr. Multiplicera med antal månader på ett år.`,
    `${monthly.toLocaleString('sv-SE')} × 12 månader = ? Räkna ut och ange svaret.`,
    `Svaret är ${(monthly * 12).toLocaleString('sv-SE')} kr. Ange detta!`,
  ];
  return hints[Math.min(attempt, hints.length - 1)];
}

function getTip(key) {
  const tips = {
    jobb: 'Sätt tydliga mål med din chef. Be om mer ansvar, en mentor eller en utbildning.',
    fritid: 'Skydda din vilotid — stäng av jobbnotiser efter arbetstid.',
    motion: 'Börja enkelt: 20 minuters promenad 3 ggr/vecka. Bygg upp gradvis.',
    familj: 'Sätt en fast tid i veckan för familj — t.ex. söndagsmiddag.',
    vanner: 'Planera sociala aktiviteter i förväg — de glider lätt bort i vardagen.',
    hobby: 'Boka tid för din hobby som om det vore ett möte — det är lika viktigt.',
  };
  return tips[key];
}

// ============================================================
// HELPERS
// ============================================================
function renderOpt(level, key, val, text, correct) {
  const answered = GS[level][key] !== null;
  const chosen = GS[level][key] === val;
  const isCorrect = val === correct;
  const hintKey = `${level}_${key}`;

  // If this option was chosen AND it's wrong — show retry state
  if (answered && chosen && !isCorrect) {
    return `<button class="quiz-opt wrong locked">${text}</button>`;
  }
  // If correct answer was chosen — lock all
  if (answered && GS[level][key] === correct) {
    if (isCorrect) return `<button class="quiz-opt correct locked">${text}</button>`;
    return `<button class="quiz-opt locked">${text}</button>`;
  }
  // Not yet answered, or wrong was chosen (show all options again after reset)
  const cls = answered ? 'locked' : '';
  return `<button class="quiz-opt ${cls}" onclick="${answered ? '' : `answerQuiz('${level}','${key}','${val}','${correct}','${hintKey}');render()`}">${text}</button>`;
}

function answerQuiz(level, key, val, correct, hintKey) {
  GS[level][key] = val;
  if (val !== correct) {
    GS.attempts[hintKey] = (GS.attempts[hintKey] || 0) + 1;
  }
}

function checkNet() {
  const p = PROFESSIONS[GS.profession];
  const val = parseInt(GS.l1.netInput);
  if (val > 0 && Math.abs(val - p.netto) >= 700) {
    GS.attempts.l1_net = (GS.attempts.l1_net || 0) + 1;
  }
  render();
}

function checkAnnual() {
  const h = HOUSING[GS.housing];
  const val = parseInt(GS.l2.annualInput);
  if (val > 0 && Math.abs(val - h.total * 12) >= 3000) {
    GS.attempts.l2_annual = (GS.attempts.l2_annual || 0) + 1;
  }
  render();
}

function renderBudgetLive() {
  const p = PROFESSIONS[GS.profession];
  const h = HOUSING[GS.housing];
  const s = GS.l3.sliders;
  const carCost = carMonthlyCost();
  const t = s.mat+s.transport+s.telefon+s.forsakring+s.streaming+s.ovrigt+carCost;
  const rem = p.netto - h.total - t;
  Object.keys(s).forEach(k => {
    const el = document.getElementById('sv_'+k);
    if (el) el.textContent = fmt(s[k]);
  });
  // Car slider live labels
  const carMap = {
    car_price: fmt(GS.car.price),
    car_months: GS.car.months + ' mån',
    car_rate: GS.car.rate + '%',
    car_tax: fmt(GS.car.tax),
    car_ins: fmt(GS.car.insurance),
    car_serv: fmt(GS.car.service),
    car_bes: fmt(GS.car.besiktning) + ' kr/år',
    car_km: GS.car.km.toLocaleString('sv-SE') + ' km',
    car_fuel: GS.car.fuel + ' l/mil',
    car_fprice: GS.car.fuelPrice + ' kr',
  };
  Object.entries(carMap).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  });
  const rv = document.getElementById('remainingVal');
  if (rv) {
    rv.textContent = (rem < 0 ? '−' : '+') + fmt(Math.abs(rem));
    rv.style.color = rem < 0 ? 'var(--danger)' : rem < 500 ? 'var(--warning)' : 'var(--success)';
  }
}

function approveLevel(n) {
  if (!GS.completed.includes(n)) GS.completed.push(n);
  render();
}

function goLevel(n) {
  GS.screen = 'level' + n;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function goScreen(s) {
  GS.screen = s;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function selectProf(id) {
  GS.profession = id;
  render();
}

function selectHousing(id) {
  GS.housing = id;
  render();
}

function startGame() {
  if (!GS.profession || !GS.housing) return;
  GS.screen = 'level1';
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function resetGame() {
  Object.assign(GS, {
    screen: 'intro', profession: null, housing: null, completed: [],
    l1: { q1: null, q2: null, netInput: '' },
    l2: { q1: null, annualInput: '' },
    l3: { sliders: { mat: 3200, transport: 1050, telefon: 299, forsakring: 180, streaming: 249, ovrigt: 500 } },
    l4: { choice: null },
    l5: { wheel: { jobb: 5, fritid: 5, motion: 5, familj: 5, vanner: 5, hobby: 5 } },
    attempts: { l1_q1:0, l1_q2:0, l1_net:0, l2_q1:0, l2_annual:0 },
    car: { own: false, price: 120000, loanType: 'billan', rate: 7, months: 60, tax: 130, insurance: 500, service: 250, besiktning: 100, km: 1500, fuel: 0.8, fuelPrice: 22 },
  });
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ============================================================
// LIFE WHEEL (Canvas)
// ============================================================
function drawWheel() {
  const canvas = document.getElementById('wheelCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, R = Math.min(W,H)/2 - 28;
  const w = GS.l5.wheel;

  const AREAS = [
    { key:'jobb',   label:'Jobb',     color:'#FF7A3C' },
    { key:'fritid', label:'Fritid',   color:'#3CAEFF' },
    { key:'motion', label:'Motion',   color:'#34D399' },
    { key:'familj', label:'Familj',   color:'#C084FC' },
    { key:'vanner', label:'Vänner',   color:'#FBBF24' },
    { key:'hobby',  label:'Hobby',    color:'#FB5151' },
  ];
  const N = AREAS.length;
  const slice = (2 * Math.PI) / N;
  const offset = -Math.PI / 2;

  ctx.clearRect(0, 0, W, H);

  // Draw background grid rings
  for (let r = 1; r <= 10; r++) {
    ctx.beginPath();
    ctx.arc(cx, cy, R * r/10, 0, 2*Math.PI);
    ctx.strokeStyle = r % 5 === 0 ? '#C8D4DE' : '#E8EDF2';
    ctx.lineWidth = r % 5 === 0 ? 1.5 : 0.8;
    ctx.stroke();
  }

  // Draw segment lines
  AREAS.forEach((_, i) => {
    const angle = offset + i * slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
    ctx.strokeStyle = '#C8D4DE';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Draw filled polygon
  ctx.beginPath();
  AREAS.forEach((a, i) => {
    const angle = offset + i * slice + slice/2;
    const val = w[a.key] / 10;
    const x = cx + R * val * Math.cos(angle);
    const y = cy + R * val * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(52, 211, 153, 0.15)';
  ctx.fill();
  ctx.strokeStyle = '#34D399';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Dots per segment with color
  AREAS.forEach((a, i) => {
    const angle = offset + i * slice + slice/2;
    const val = w[a.key] / 10;
    const x = cx + R * val * Math.cos(angle);
    const y = cy + R * val * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, 2*Math.PI);
    ctx.fillStyle = a.color;
    ctx.fill();
  });

  // Labels
  ctx.font = '600 12px "DM Sans", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  AREAS.forEach((a, i) => {
    const angle = offset + i * slice + slice/2;
    const lr = R + 20;
    const x = cx + lr * Math.cos(angle);
    const y = cy + lr * Math.sin(angle);
    ctx.fillStyle = a.color;
    ctx.fillText(a.label, x, y);
  });

  // Center score
  const avg = (Object.values(w).reduce((a,b)=>a+b,0)/N).toFixed(1);
  ctx.font = 'bold 22px "Syne", sans-serif';
  ctx.fillStyle = '#1A2332';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(avg, cx, cy-8);
  ctx.font = '11px "DM Sans", sans-serif';
  ctx.fillStyle = '#4A5568';
  ctx.fillText('snitt', cx, cy+12);
}

// ============================================================
// INIT
// ============================================================
render();
</script>
